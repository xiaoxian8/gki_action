name: Build Android GKI Kernel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Kernel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl lz4 liblz4-tool device-tree-compiler zip unzip curl git make

      - name: Run kernel build script
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/xiaoxian8/gki_action/main/build.sh)"

      - name: Upload kernel artifact
        uses: actions/upload-artifact@v3
        with:
          name: kernel-zip
          path: out/kernel.zip
